# fly.toml app configuration file for lingering-sound-7129
# Updated following modern Fly.io best practices.

app = "lingering-sound-7129"
primary_region = "dfw"

kill_signal = "SIGINT"
kill_timeout = "5s"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "2s"
    interval = "15s"
    method = "GET"
    path = "/"
    protocol = "http"
    timeout = "2s"
